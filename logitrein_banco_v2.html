<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logitrein Bank — Sistema Integrado</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#09182e;--navy2:#112240;--navy3:#1a3a6b;
  --blue:#1a56db;--teal:#00c9a7;--gold:#f5c842;
  --red:#e94b4b;--green:#22c55e;--orange:#f97316;
  --muted:#7a9bbf;--border:rgba(255,255,255,.07);
  --card:#132240;--card2:#172b4d;--radius:14px;
  --hf:'Syne',sans-serif;--bf:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--bf);background:var(--navy);color:#ddeaf8;min-height:100vh;overflow-x:hidden}

/* LOGIN */
#screen-login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#09182e 0%,#112240 60%,#0d2a55 100%);position:relative;overflow:hidden}
#screen-login::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 70% 40%,rgba(0,201,167,.07) 0%,transparent 70%)}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:48px 42px;width:420px;max-width:94vw;position:relative;z-index:1;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.login-logo{font-family:var(--hf);font-size:1.8rem;font-weight:800;color:var(--teal);text-align:center;margin-bottom:6px}
.login-logo span{color:var(--gold)}
.login-sub{text-align:center;color:var(--muted);font-size:.83rem;margin-bottom:32px}
.login-box label{display:block;font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;margin-top:16px}
.login-box input{width:100%;padding:12px 16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#e2ecf8;font-family:var(--bf);font-size:.95rem;transition:border .2s}
.login-box input:focus{outline:none;border-color:var(--teal)}
.btn-login{width:100%;margin-top:24px;padding:13px;background:linear-gradient(90deg,var(--blue),#0e47c4);color:#fff;border:none;border-radius:10px;font-family:var(--hf);font-size:.95rem;font-weight:700;cursor:pointer;letter-spacing:.4px;transition:opacity .2s}
.btn-login:hover{opacity:.9}
#login-err{margin-top:14px;padding:10px 14px;border-radius:8px;font-size:.83rem;background:rgba(233,75,75,.12);border:1px solid rgba(233,75,75,.3);color:#fca5a5;display:none}
.login-hint{margin-top:20px;font-size:.72rem;color:var(--muted);text-align:center;line-height:1.7;padding:12px;background:rgba(255,255,255,.03);border-radius:8px;border:1px solid var(--border)}

/* APP */
#app{display:none}
#sidebar{position:fixed;left:0;top:0;bottom:0;width:250px;background:var(--navy2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;transition:transform .3s}
.sb-logo{padding:22px 20px 14px;font-family:var(--hf);font-size:1.15rem;font-weight:800;color:var(--teal);border-bottom:1px solid var(--border)}
.sb-logo span{color:var(--gold)}
.sb-profile{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.82rem;color:#fff;flex-shrink:0}
.sb-info{flex:1;overflow:hidden}
.sb-name{font-size:.86rem;font-weight:600;color:#e2ecf8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-role{font-size:.68rem;color:var(--muted);margin-top:2px}
.role-badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.role-ceo{background:rgba(245,200,66,.18);color:var(--gold)}
.role-gerente{background:rgba(26,86,219,.22);color:#93b4f7}
.role-pf{background:rgba(0,201,167,.14);color:var(--teal)}
.role-pj{background:rgba(249,115,22,.18);color:#fdba74}
.role-salario{background:rgba(34,197,94,.14);color:#86efac}
.sb-menu{flex:1;overflow-y:auto;padding:8px 0}
.sb-group{padding:8px 20px 2px;font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;font-weight:700}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 20px;cursor:pointer;font-size:.84rem;color:#8baac8;transition:all .18s;border-left:3px solid transparent}
.sb-item:hover,.sb-item.active{color:#fff;background:rgba(26,86,219,.13);border-left-color:var(--teal)}
.sb-item .ico{width:18px;text-align:center}
.sb-footer{padding:12px 18px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sb-footer span{font-size:.7rem;color:var(--muted)}
.btn-logout{background:none;border:1px solid rgba(233,75,75,.3);color:#fca5a5;padding:5px 12px;border-radius:6px;font-size:.73rem;cursor:pointer;font-family:var(--bf);transition:background .2s}
.btn-logout:hover{background:rgba(233,75,75,.15)}

#main{margin-left:250px;min-height:100vh;display:flex;flex-direction:column}
#topbar{background:var(--navy2);border-bottom:1px solid var(--border);padding:12px 28px;display:flex;align-items:center;justify-content:space-between}
.topbar-title{font-family:var(--hf);font-size:1rem;font-weight:700;color:#fff}
.topbar-right{display:flex;align-items:center;gap:12px;font-size:.78rem;color:var(--muted)}
.saldo-pill{background:rgba(0,201,167,.1);border:1px solid rgba(0,201,167,.2);border-radius:20px;padding:4px 14px;color:var(--teal);font-weight:600;font-family:var(--hf);font-size:.83rem}
#content{flex:1;padding:26px 28px}

.panel{display:none}
.panel.active{display:block;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(176px,1fr));gap:14px;margin-bottom:22px}
.metric{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.metric-label{font-size:.66rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.metric-value{font-family:var(--hf);font-size:1.4rem;font-weight:700}
.metric-sub{font-size:.7rem;color:var(--muted);margin-top:3px}
.mv-green{color:var(--green)}.mv-teal{color:var(--teal)}.mv-gold{color:var(--gold)}.mv-red{color:var(--red)}.mv-blue{color:#93b4f7}.mv-orange{color:var(--orange)}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.card h2{font-family:var(--hf);font-size:.93rem;font-weight:700;color:#fff;margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{font-size:.58rem;padding:2px 8px;border-radius:99px;background:rgba(0,201,167,.13);color:var(--teal);font-weight:700}
.badge-gold{background:rgba(245,200,66,.13);color:var(--gold)}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

label{display:block;font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin:10px 0 4px}
input,select,textarea{width:100%;padding:9px 12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#e2ecf8;font-family:var(--bf);font-size:.87rem;transition:border .2s}
input:focus,select:focus{outline:none;border-color:var(--teal)}
select option{background:var(--navy2)}
.btn{margin-top:11px;padding:9px 18px;border:none;border-radius:8px;font-family:var(--hf);font-size:.83rem;font-weight:700;cursor:pointer;transition:all .18s;letter-spacing:.3px}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:#2563eb}
.btn-teal{background:var(--teal);color:var(--navy)}.btn-teal:hover{background:#00b096}
.btn-gold{background:var(--gold);color:var(--navy)}.btn-gold:hover{background:#e2b800}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#d03030}
.btn-green{background:var(--green);color:var(--navy)}.btn-green:hover{background:#16a34a}
.btn-orange{background:var(--orange);color:#fff}.btn-orange:hover{background:#ea6f00}
.btn-sm{padding:6px 13px;font-size:.73rem;margin-top:5px}
.btn-ghost{background:rgba(255,255,255,.07);color:var(--muted)}.btn-ghost:hover{background:rgba(255,255,255,.12)}
.btn-row{display:flex;gap:7px;flex-wrap:wrap}

.res{margin-top:10px;padding:10px 14px;border-radius:8px;font-size:.82rem;display:none;white-space:pre-line;line-height:1.6}
.res.show{display:block;animation:fadeUp .2s}
.res.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.22);color:#86efac}
.res.err{background:rgba(233,75,75,.1);border:1px solid rgba(233,75,75,.22);color:#fca5a5}
.res.info{background:rgba(0,201,167,.08);border:1px solid rgba(0,201,167,.18);color:#6ee7da}

.tx-list{max-height:320px;overflow-y:auto}
.tx-item{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--border);font-size:.82rem}
.tx-item:last-child{border:none}
.tx-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}
.ico-out{background:rgba(233,75,75,.13)}.ico-in{background:rgba(34,197,94,.13)}.ico-neutral{background:rgba(0,201,167,.09)}
.tx-desc{flex:1}.tx-desc .t{color:#e2ecf8;font-weight:500}.tx-desc .s{color:var(--muted);font-size:.7rem;margin-top:1px}
.tx-val{font-family:var(--hf);font-weight:700}
.val-out{color:var(--red)}.val-in{color:var(--green)}

table{width:100%;border-collapse:collapse;font-size:.8rem}
th{text-align:left;padding:8px 11px;color:var(--muted);font-size:.65rem;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border);font-weight:700}
td{padding:9px 11px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border:none}
tr:hover td{background:rgba(255,255,255,.015)}

.vcard{width:290px;max-width:100%;background:linear-gradient(135deg,#1a56db,#0b1f3a);border-radius:15px;padding:20px;font-family:var(--hf);position:relative;overflow:hidden;box-shadow:0 10px 32px rgba(0,0,0,.4);margin-bottom:12px}
.vcard::before{content:'';position:absolute;right:-16px;top:-16px;width:130px;height:130px;border-radius:50%;background:rgba(0,201,167,.11)}
.vcard-bank{font-size:.58rem;letter-spacing:2px;color:rgba(255,255,255,.38);margin-bottom:18px}
.chip{width:28px;height:20px;background:var(--gold);border-radius:4px;margin-bottom:10px}
.vcard-num{font-size:.85rem;letter-spacing:3px;color:rgba(255,255,255,.72);margin-bottom:16px}
.vcard-row{display:flex;justify-content:space-between}
.vl{font-size:.55rem;color:rgba(255,255,255,.32);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.vv{font-size:.78rem;color:#fff}

.prog-wrap{background:rgba(255,255,255,.07);border-radius:99px;height:5px;margin-top:4px}
.prog-bar{background:var(--teal);border-radius:99px;height:5px;transition:width .6s}

#toast{position:fixed;bottom:22px;right:22px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 16px;font-size:.82rem;display:none;box-shadow:0 8px 26px rgba(0,0,0,.4);z-index:9999;max-width:270px}
#toast.show{display:block;animation:fadeUp .3s}
#toast.ok{border-color:rgba(34,197,94,.32);color:#86efac}
#toast.err{border-color:rgba(233,75,75,.32);color:#fca5a5}
#toast.info{border-color:rgba(0,201,167,.28);color:var(--teal)}

.ticker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:9px;margin-bottom:16px}
.ticker-card{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:9px;padding:11px;cursor:pointer;transition:border-color .2s}
.ticker-card:hover{border-color:var(--teal)}
.t-sym{font-family:var(--hf);font-weight:700;font-size:.88rem}
.t-price{font-size:.78rem;color:var(--muted);margin:2px 0}
.t-chg{font-size:.74rem;font-weight:700}
.chg-up{color:var(--green)}.chg-dn{color:var(--red)}

.form-section{padding:14px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;margin-bottom:14px}

@media(max-width:900px){
  #sidebar{transform:translateX(-250px)}#sidebar.open{transform:none}
  #main{margin-left:0}.g2,.g3{grid-template-columns:1fr}
}
.hamburger{display:none;background:none;border:none;color:#fff;font-size:1.4rem;cursor:pointer}
@media(max-width:900px){.hamburger{display:block}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login">
  <div class="login-box">
    <div class="login-logo">🏦 Logit<span>rein</span> Bank</div>
    <div class="login-sub">Acesse sua conta com segurança</div>
    <label>Login</label>
    <input type="text" id="l-login" placeholder="Digite seu login" autocomplete="username">
    <label>Senha</label>
    <input type="password" id="l-senha" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')fazerLogin()">
    <button class="btn-login" onclick="fazerLogin()">Entrar no Sistema</button>
    <div id="login-err">❌ Login ou senha incorretos. Fale com o gerente.</div>
    <div class="login-hint">
      Acesso restrito ao Logitrein Bank.<br>
      Seu login e senha foram fornecidos pelo gerente da sua agência.<br>
      Em caso de dúvidas, procure o atendimento.
    </div>
    <div style="text-align:center;margin-top:8px">
      <button onclick="resetBanco()" style="background:none;border:none;color:rgba(90,110,140,.3);font-size:.62rem;cursor:pointer;font-family:inherit;text-decoration:underline;padding:4px">
        Redefinir dados locais
      </button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div id="toast"></div>
  <aside id="sidebar">
    <div class="sb-logo">🏦 Logit<span>rein</span></div>
    <div class="sb-profile">
      <div class="sb-avatar" id="sb-av"></div>
      <div class="sb-info">
        <div class="sb-name" id="sb-nome"></div>
        <div class="sb-role"><span class="role-badge" id="sb-badge"></span></div>
      </div>
    </div>
    <nav class="sb-menu" id="sb-menu"></nav>
    <div class="sb-footer">
      <span>v2.1 Logitrein</span>
      <button class="btn-logout" onclick="logout()">Sair</button>
    </div>
  </aside>
  <div id="main">
    <div id="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
        <div class="topbar-title" id="page-title">Dashboard</div>
      </div>
      <div class="topbar-right">
        <span id="tb-conta"></span>
        <span class="saldo-pill" id="tb-saldo"></span>
      </div>
    </div>
    <div id="content"></div>
  </div>
</div>

<script>
// ════════════════════════════════════
//  DATABASE (localStorage)
//  Chave: lt_banco_users  (separada do Logitrein lt4_*)
// ════════════════════════════════════
const DB_KEY = 'lt_banco_users';

// Usuários padrão — sempre garantidos, nunca perdidos
const USUARIOS_PADRAO = [
  {id:'u0',login:'ceo',       senha:'ceo123',    nome:'Roberto Logitrein', role:'ceo',     agencia:'0001',conta:'00001-0',saldo:50000,poupanca:0,investimentos:0,cashback:0,dividas:0,cartoes:[],transacoes:[],ativo:true},
  {id:'u1',login:'gerente1',  senha:'ger123',    nome:'Ana Gerente',       role:'gerente', agencia:'0001',conta:'00002-1',saldo:15000,poupanca:0,investimentos:0,cashback:0,dividas:0,cartoes:[],transacoes:[],ativo:true},
  {id:'u2',login:'joao.silva',senha:'123456',    nome:'João da Silva',     role:'pf',      agencia:'0001',conta:'10001-2',saldo:3500, poupanca:500,investimentos:0,cashback:0,dividas:0,cartoes:[],transacoes:[],ativo:true},
  {id:'u3',login:'emp.ltda',  senha:'empresa1',  nome:'Empresa Logitrein', role:'pj',      agencia:'0001',conta:'20001-3',saldo:25000,poupanca:0,investimentos:0,cashback:0,dividas:0,cartoes:[],transacoes:[],cnpj:'00.000.000/0001-00',ativo:true},
  {id:'u4',login:'maria.santos',senha:'salario1',nome:'Maria dos Santos',  role:'salario', agencia:'0001',conta:'30001-4',saldo:2800, poupanca:0,investimentos:0,cashback:0,dividas:0,cartoes:[],transacoes:[],empregador:'Empresa Logitrein',ativo:true},
];

function initDB(){
  // Limpa chaves antigas de versões anteriores
  ['lt_v2','lt_users'].forEach(k => {
    if(localStorage.getItem(k) !== null) {
      // Só remove se não for a nossa chave atual
      console.log('[Banco] Chave legada detectada:', k);
    }
  });
  
  let users;
  try {
    users = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
    if (!Array.isArray(users)) users = [];
  } catch(e) {
    users = [];
  }
  
  // Garante que todos os usuários padrão existem
  // Nunca sobrescreve saldo/transações de quem já existe
  USUARIOS_PADRAO.forEach(padrao => {
    const idx = users.findIndex(u => u.id === padrao.id || u.login === padrao.login);
    if (idx === -1) {
      // Usuário não existe — cria completo
      users.push({...padrao});
    } else {
      // Usuário existe — garante campos críticos sem apagar dados financeiros
      users[idx].login  = padrao.login;   // login nunca muda
      users[idx].senha  = users[idx].senha || padrao.senha;  // preserva senha customizada
      users[idx].role   = padrao.role;    // role nunca muda
      users[idx].ativo  = users[idx].ativo !== undefined ? users[idx].ativo : true;
      users[idx].nome   = users[idx].nome || padrao.nome;
      users[idx].agencia= users[idx].agencia || padrao.agencia;
      users[idx].conta  = users[idx].conta || padrao.conta;
      // Campos financeiros — só inicializa se não existirem
      if (users[idx].saldo === undefined) users[idx].saldo = padrao.saldo;
      if (!users[idx].transacoes) users[idx].transacoes = [];
      if (!users[idx].cartoes) users[idx].cartoes = [];
    }
  });
  saveUsers(users);
}

// Botão de reset de emergência (apenas para debug)
function resetBanco(){
  if(!confirm('⚠️ ATENÇÃO: Isso apagará TODOS os dados do banco e recriará os usuários padrão. Confirmar?'))return;
  localStorage.removeItem(DB_KEY);
  localStorage.removeItem('lt_banco_folhas_proc');
  initDB();
  toast('✅ Banco resetado! Faça login novamente.','info');
  setTimeout(()=>location.reload(), 1500);
}

const getUsers = () => JSON.parse(localStorage.getItem(DB_KEY) || '[]');
const saveUsers = u => localStorage.setItem(DB_KEY, JSON.stringify(u));
const getMe = id => getUsers().find(u => u.id === id);
function saveMe(upd){const us=getUsers();const i=us.findIndex(u=>u.id===upd.id);if(i>=0){us[i]=upd;saveUsers(us);}}

// ════════════════════════════════════
//  INTEGRAÇÃO LOGITREIN v12 → BANCO
//  Lê lt4_dp_folhas (salvo pelo Logitrein)
//  e deposita automaticamente nas contas salário
// ════════════════════════════════════
function bancoBridge_depositarFolha(linhas, mesAno){
  // linhas = [{nome, liquido, uk}, ...]  — formato exato do Logitrein
  const users = getUsers();
  let depositados = 0, naoEncontrados = [];

  linhas.forEach(linha => {
    if (!linha.liquido || linha.liquido <= 0) return;
    // Tenta achar conta pelo nome (case-insensitive, aceita parcial)
    const nomeNorm = (linha.nome||'').toLowerCase().trim();
    let conta = users.find(u =>
      u.role === 'salario' && u.ativo &&
      (u.nome||'').toLowerCase().trim() === nomeNorm
    );
    // Se não achou exato, tenta parcial
    if (!conta) {
      conta = users.find(u =>
        u.role === 'salario' && u.ativo &&
        ((u.nome||'').toLowerCase().includes(nomeNorm) || nomeNorm.includes((u.nome||'').toLowerCase().split(' ')[0]))
      );
    }
    if (conta) {
      conta.saldo = (conta.saldo || 0) + linha.liquido;
      conta.transacoes = conta.transacoes || [];
      conta.transacoes.unshift({
        tipo:'deposito',
        desc:`💼 Salário ${mesAno} — Logitrein`,
        valor: linha.liquido,
        dir:'in',
        ts: new Date().toLocaleString('pt-BR')
      });
      depositados++;
    } else {
      naoEncontrados.push(linha.nome);
    }
  });

  saveUsers(users);
  return {depositados, naoEncontrados};
}

// Verifica folhas pendentes de processar do Logitrein
function bancoBridge_verificarFolhasPendentes(){
  const folhas = JSON.parse(localStorage.getItem('lt4_dp_folhas') || '[]');
  const processadas = JSON.parse(localStorage.getItem('lt_banco_folhas_proc') || '[]');
  const pendentes = folhas.filter(f => !processadas.includes(f.id));
  return {folhas, pendentes};
}

function bancoBridge_processarPendentes(){
  const {pendentes} = bancoBridge_verificarFolhasPendentes();
  if (pendentes.length === 0) return null;
  const processadas = JSON.parse(localStorage.getItem('lt_banco_folhas_proc') || '[]');
  let totalDep = 0, total_nao = [];
  pendentes.forEach(folha => {
    const res = bancoBridge_depositarFolha(folha.linhas || [], folha.mesAno);
    totalDep += res.depositados;
    total_nao = [...total_nao, ...res.naoEncontrados];
    processadas.push(folha.id);
  });
  localStorage.setItem('lt_banco_folhas_proc', JSON.stringify(processadas));
  return {pendentes: pendentes.length, depositados: totalDep, naoEncontrados: total_nao};
}

let SESSION=null;
function fazerLogin(){
  try {
    // Garante que o DB está inicializado antes de tentar login
    initDB();
    const login=document.getElementById('l-login').value.trim().toLowerCase();
    const senha=document.getElementById('l-senha').value;
    const users=getUsers();
    // Busca case-insensitive por login
    const user=users.find(u=>(u.login||'').toLowerCase()===login && u.senha===senha && u.ativo);
    if(!user){
      const errEl=document.getElementById('login-err');
      errEl.style.display='block';
      errEl.textContent='Login ou senha incorretos. Procure o gerente da sua agência.';
      return;
    }
    SESSION=user.id;
    document.getElementById('login-err').style.display='none';
    document.getElementById('screen-login').style.display='none';
    document.getElementById('app').style.display='block';
    buildApp(user);
  } catch(e) {
    console.error('[Banco] fazerLogin error:', e);
    alert('Erro ao fazer login. Tente clicar em "Redefinir dados locais" abaixo do botão Entrar.');
  }
}

  SESSION=null;
  document.getElementById('screen-login').style.display='flex';

function toast(msg,type='ok'){const t=document.getElementById('toast');t.textContent=msg;t.className='show '+type;setTimeout(()=>t.className='',3200);}
function pmt(r,n,pv){return pv*r/(1-Math.pow(1+r,-n));}
const tsNow=()=>new Date().toLocaleString('pt-BR');
const genID=()=>'u'+(Date.now()+Math.floor(Math.random()*9999));
function r(id,msg,type){const el=document.getElementById(id);if(!el)return;el.className='res show '+type;el.textContent=msg;}
function addTx(uid,tipo,desc,valor,dir){const us=getUsers();const i=us.findIndex(u=>u.id===uid);if(i<0)return;us[i].transacoes.unshift({tipo,desc,valor,dir,ts:tsNow()});saveUsers(us);}
function debit(uid,val,tipo,desc,resId){
  const us=getUsers();const i=us.findIndex(u=>u.id===uid);
  if(val>us[i].saldo){r(resId,'Saldo insuficiente.','err');return false;}
  us[i].saldo-=val;us[i].transacoes.unshift({tipo,desc,valor:val,dir:'out',ts:tsNow()});
  saveUsers(us);document.getElementById('tb-saldo').textContent=fmt(us[i].saldo);return true;
}
function credit(uid,val,tipo,desc){
  const us=getUsers();const i=us.findIndex(u=>u.id===uid);
  us[i].saldo+=val;us[i].transacoes.unshift({tipo,desc,valor:val,dir:'in',ts:tsNow()});
  saveUsers(us);document.getElementById('tb-saldo').textContent=fmt(us[i].saldo);
}

function rBolsa(){
  setC(`<div class="card"><h2>📊 Cotações B3 <span class="badge">Auto-atualiza 4s</span></h2><div class="ticker-grid" id="tgrid"></div></div>
  <div class="g2">

      <label>Ação</label><select id="bs-s" onchange="cBolsa()"><option>—</option></select>
      <label>Operação</label><select id="bs-op" onchange="cBolsa()"><option value="comprar">Comprar</option><option value="vender">Vender</option></select>
      <label>Lotes (1 lote = 100 ações)</label><input type="number" id="bs-q" value="1" min="1" oninput="cBolsa()">
      <div class="res info show" id="bs-c">Selecione a ação.</div>
      <button class="btn btn-gold" onclick="opBolsa()">Executar Ordem</button>
      <div class="res" id="bs-r"></div>
    </div>
    <div class="card"><h2>📁 Minha Carteira</h2><div id="bs-cart"><p style="color:var(--muted);font-size:.82rem">Sem posições abertas.</p></div></div>
  </div>`);
  buildTkrs();if(tickerInt)clearInterval(tickerInt);tickerInt=setInterval(buildTkrs,4000);
}
function buildTkrs(){
  TKRS.forEach(t=>{t.p=Math.max(1,t.p+(Math.random()-.5)*1.4);t.c=parseFloat(((Math.random()-.5)*2).toFixed(2));});
  const tg=document.getElementById('tgrid');if(!tg){clearInterval(tickerInt);return;}
  tg.innerHTML=TKRS.map(t=>`<div class="ticker-card" onclick="document.getElementById('bs-s').value='${t.s}';cBolsa()"><div class="t-sym">${t.s}</div><div class="t-price">${fmt(t.p)}</div><div class="t-chg ${t.c>=0?'chg-up':'chg-dn'}">${t.c>=0?'+':''}${t.c.toFixed(2)}%</div></div>`).join('');
  const sel=document.getElementById('bs-s');if(!sel)return;
  sel.innerHTML='<option>—</option>'+TKRS.map(t=>`<option value="${t.s}">${t.s} — ${fmt(t.p)}</option>`).join('');
}
function cBolsa(){
  const sym=document.getElementById('bs-s')?.value,q=parseInt(document.getElementById('bs-q')?.value)||1;
  const t=TKRS.find(x=>x.s===sym);if(!t)return;
  document.getElementById('bs-c').textContent=`${q} lote(s) × 100 × ${fmt(t.p)} = ${fmt(t.p*q*100)}`;
}
function opBolsa(){
  const sym=document.getElementById('bs-s').value,op=document.getElementById('bs-op').value;
  const q=parseInt(document.getElementById('bs-q').value)||1;
  const t=TKRS.find(x=>x.s===sym);if(!t)return r('bs-r','Selecione uma ação.','err');
  const acoes=q*100,custo=t.p*acoes;
  const us=getUsers();const i=us.findIndex(u=>u.id===SESSION);
  if(op==='comprar'){
    if(!debit(SESSION,custo,'investimento',`Compra ${acoes} ações ${sym}`,'bs-r'))return;
    us[i].investimentos=(us[i].investimentos||0)+custo;saveUsers(us);
    r('bs-r',`✅ Compra de ${acoes} ações de ${sym} — ${fmt(custo)}`,'ok');toast('Compra executada!');
  }else{
    credit(SESSION,custo,'investimento',`Venda ${acoes} ações ${sym}`);
    us[i].investimentos=Math.max(0,(us[i].investimentos||0)-custo);saveUsers(us);
    r('bs-r',`✅ Venda de ${acoes} ações — +${fmt(custo)}`,'ok');toast('Venda executada!');
  }
}

    <button class="btn btn-blue" onclick="opFolha()">Processar Folha</button>
    <div class="res" id="fl-r"></div></div>`);
}
function simFolha(){
  const f=parseInt(document.getElementById('fl-fn')?.value)||0,s=parseFloat(document.getElementById('fl-sl')?.value)||0;
  const tot=f*s,enc=tot*0.28;
  document.getElementById('fl-s').textContent=`Salários: ${fmt(tot)} | INSS(20%): ${fmt(tot*.2)} | FGTS(8%): ${fmt(tot*.08)} | TOTAL: ${fmt(tot+enc)}`;
}
function opFolha(){
  const f=parseInt(document.getElementById('fl-fn').value)||0,s=parseFloat(document.getElementById('fl-sl').value)||0;
  const grand=f*s*1.28;if(!grand)return r('fl-r','Preencha os campos.','err');
  if(!debit(SESSION,grand,'folha',`Folha ${f} funcionários`,'fl-r'))return;
  r('fl-r',`✅ Folha processada!\n${f} funcionários × ${fmt(s)}\nTotal com encargos: ${fmt(grand)}`,'ok');toast('Folha processada!');
}

    <table><thead><tr><th>Nome</th><th>Login</th><th>Perfil</th><th>Agência</th><th>Conta</th><th>Saldo</th><th>Status</th><th>Ações</th></tr></thead>
    <tbody>${editable.map(u=>`<tr>
      <td><strong>${u.nome}</strong></td>
      <td style="color:var(--muted);font-size:.75rem">${u.login}</td>

      <td>${u.agencia}</td><td>${u.conta}</td>

        <button class="btn btn-blue btn-sm" onclick="opSenha('${u.id}')">🔑</button>
        <button class="btn ${u.ativo?'btn-red':'btn-green'} btn-sm" onclick="opToggle('${u.id}')">${u.ativo?'Bloquear':'Ativar'}</button>
        <button class="btn btn-sm" style="background:rgba(0,201,167,.14);color:var(--teal)" onclick="opAjusteSaldo('${u.id}')">💰</button>

function toggleForm(){const f=document.getElementById('form-novo');f.style.display=f.style.display==='none'?'block':'none';}
function opCriarUser(){
  const nome=document.getElementById('nu-n').value.trim(),login=document.getElementById('nu-l').value.trim();
  const senha=document.getElementById('nu-s').value,role=document.getElementById('nu-r').value;
  const saldo=parseFloat(document.getElementById('nu-sl').value)||0,agencia=document.getElementById('nu-ag').value||'0001';
  if(!nome||!login||!senha)return r('nu-r-msg','Preencha nome, login e senha.','err');
  if(senha.length<4)return r('nu-r-msg','Senha deve ter mín. 4 caracteres.','err');
  const us=getUsers();
  if(us.find(u=>u.login===login))return r('nu-r-msg','Login já existe!','err');
  const conta=(10000+us.length)+'-'+Math.floor(Math.random()*9);
  us.push({id:genID(),login,senha,nome,role,agencia,conta,saldo,poupanca:0,investimentos:0,cashback:0,dividas:0,cartoes:[],transacoes:[],ativo:true});
  saveUsers(us);
  r('nu-r-msg',`✅ "${nome}" criado!\nLogin: ${login} | Conta: ${conta} | Senha: (salva)`,'ok');
  toast('Usuário criado: '+login,'info');
  setTimeout(rUsuarios,1600);
}
function opSenha(uid){
  const nova=prompt('Nova senha (mín. 4 caracteres):');
  if(!nova||nova.length<4)return alert('Senha inválida.');
  const us=getUsers();const i=us.findIndex(u=>u.id===uid);us[i].senha=nova;saveUsers(us);toast('Senha alterada!','info');
}
function opToggle(uid){
  const us=getUsers();const i=us.findIndex(u=>u.id===uid);us[i].ativo=!us[i].ativo;saveUsers(us);
  toast(us[i].ativo?'Conta ativada!':'Conta bloqueada!',us[i].ativo?'ok':'err');rUsuarios();
}
function opAjusteSaldo(uid){
  const val=parseFloat(prompt('Valor a creditar (positivo) ou debitar (negativo):'));
  if(isNaN(val))return;
  const us=getUsers();const i=us.findIndex(u=>u.id===uid);
  us[i].saldo+=val;
  us[i].transacoes.unshift({tipo:'deposito',desc:`Ajuste por ${getMe(SESSION).nome}`,valor:Math.abs(val),dir:val>=0?'in':'out',ts:tsNow()});
  saveUsers(us);toast('Saldo ajustado: '+fmt(val),'info');rUsuarios();
}

  setC(`<div class="dash-grid">

  </div>
  <div class="g2">

      <table><thead><tr><th>Perfil</th><th>Clientes</th><th>Saldo Total</th></tr></thead><tbody>
      ${dist.map(d=>{const soma=all.filter(u=>u.role===d.role).reduce((s,u)=>s+u.saldo,0);
        return`<tr><td><span class="role-badge role-${d.role}">${ROLE_LABELS[d.role]}</span></td><td>${d.n}</td><td style="color:var(--green)">${fmt(soma)}</td></tr>`;
      }).join('')}</tbody></table>

        <td><strong>${u.nome}</strong></td>
        <td><span class="role-badge role-${u.role}">${ROLE_LABELS[u.role]}</span></td>
        <td style="color:var(--green)">${fmt(u.saldo)}</td>
      </tr>`).join('')}</tbody></table>
    </div>
  </div>`);
}

        <div class="card">
          <h2>📊 Status das Contas Salário</h2>
          ${getUsers().filter(u=>u.role==='salario').map(u=>`
            <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:.83rem">
              <div>
                <div style="font-weight:600;color:#e2ecf8">${u.nome}</div>
                <div style="color:var(--muted);font-size:.72rem">Cta ${u.conta} · ${u.empregador||'—'}</div>
              </div>
              <div style="text-align:right">
                <div style="color:var(--green);font-weight:700;font-family:var(--hf)">${fmt2(u.saldo)}</div>
                <div style="color:var(--muted);font-size:.7rem">${u.transacoes.filter(t=>t.desc&&t.desc.includes('Salário')).length} salário(s) recebido(s)</div>
              </div>
            </div>`).join('') || '<p style="color:var(--muted);font-size:.82rem">Nenhuma conta salário cadastrada.</p>'}
        </div>
      </div>
    </div>`);
}

function opProcessarFolha(folhaId){
  const {folhas}=bancoBridge_verificarFolhasPendentes();
  const folha=folhas.find(f=>f.id===folhaId);
  if(!folha){toast('Folha não encontrada.','err');return;}
  const res=bancoBridge_depositarFolha(folha.linhas||[],folha.mesAno);
  const processadas=JSON.parse(localStorage.getItem('lt_banco_folhas_proc')||'[]');
  processadas.push(folhaId);
  localStorage.setItem('lt_banco_folhas_proc',JSON.stringify(processadas));
  toast(`✅ ${res.depositados} depósito(s) realizado(s)!${res.naoEncontrados.length?' | Sem conta: '+res.naoEncontrados.join(', '):''}`,res.depositados>0?'ok':'err');
  rIntegracao();
}

function opProcessarTodas(){
  const res=bancoBridge_processarPendentes();
  if(!res){toast('Nenhuma folha pendente.','info');return;}
  toast(`✅ ${res.pendentes} folha(s) processada(s) · ${res.depositados} depósito(s)!${res.naoEncontrados.length?' | Sem conta: '+res.naoEncontrados.join(', '):''}`,res.depositados>0?'ok':'info');
  rIntegracao();
}

function opVincularFuncionarios(){
  const lt4Users=JSON.parse(localStorage.getItem('lt4_users')||'{}');
  const ops=Object.entries(lt4Users).filter(([k,v])=>v.nivel==='OPERACIONAL');
  const bancoUsers=getUsers().filter(u=>u.role==='salario');
  if(ops.length===0){toast('Nenhum operacional no Logitrein encontrado.','err');return;}
  let html=`<div style="margin-top:8px">
    <p style="font-size:.82rem;color:var(--muted);margin-bottom:12px">Funcionários no Logitrein vs Contas Salário no Banco:</p>
    <table style="width:100%;font-size:.8rem;border-collapse:collapse">
      <thead><tr>
        <th style="text-align:left;padding:6px 8px;color:var(--muted);border-bottom:1px solid var(--border)">Logitrein</th>
        <th style="text-align:left;padding:6px 8px;color:var(--muted);border-bottom:1px solid var(--border)">Status no Banco</th>
        <th style="padding:6px 8px;border-bottom:1px solid var(--border)">Ação</th>
      </tr></thead><tbody>`;
  ops.forEach(([k,v])=>{
    const nNorm=(v.nome||'').toLowerCase().trim();
    const conta=bancoUsers.find(u=>(u.nome||'').toLowerCase().trim()===nNorm||((u.nome||'').toLowerCase().includes(nNorm)||nNorm.includes((u.nome||'').toLowerCase().split(' ')[0])));
    html+=`<tr>
      <td style="padding:6px 8px;border-bottom:1px solid var(--border)"><strong>${v.nome}</strong><br><span style="color:var(--muted);font-size:.7rem">${v.cargo||k}</span></td>
      <td style="padding:6px 8px;border-bottom:1px solid var(--border)">${conta?`<span style="color:var(--teal)">✅ ${conta.conta}</span>`:`<span style="color:var(--red)">❌ Sem conta salário</span>`}</td>
      <td style="padding:6px 8px;border-bottom:1px solid var(--border);text-align:center">${!conta?`<button class="btn btn-green btn-sm" style="margin-top:0" onclick="opCriarContaSalario('${k}','${(v.nome||'').replace(/'/g,'\'')}','${v.cargo||''}')">+ Criar Conta</button>`:'—'}</td>
    </tr>`;
  });
  html+='</tbody></table></div>';
  setC(`<div class="card"><h2>👥 Vincular Funcionários Logitrein</h2>${html}
    <button class="btn btn-teal btn-sm" style="margin-top:14px" onclick="rIntegracao()">← Voltar</button></div>`);
}

function opCriarContaSalario(ltKey,nome,cargo){
  if(!confirm(`Criar conta salário para "${nome}"?`))return;
  const us=getUsers();
  if(us.find(u=>u.nome===nome&&u.role==='salario')){toast('Conta já existe!','info');return;}
  const id='u'+Date.now();
  const login=ltKey.replace(/[^a-z0-9.]/gi,'').toLowerCase()||'func'+Date.now();
  const conta=(10000+us.length)+'-'+Math.floor(Math.random()*9);
  us.push({id,login,senha:'salario1',nome,role:'salario',agencia:'0001',conta,saldo:0,poupanca:0,investimentos:0,cashback:0,dividas:0,cartoes:[],transacoes:[],empregador:'Empresa Logitrein',ativo:true});
  saveUsers(us);
  toast(`✅ Conta criada! Login: ${login} / Senha: salario1`,'ok');
  opVincularFuncionarios();
}
