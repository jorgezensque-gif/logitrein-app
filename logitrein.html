<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>LogiTrein 4.0 — Sistema Unificado</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* 1. SEU CSS ORIGINAL (TUDO MANTIDO) */
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{
  --bg:#070b14;--bg2:#0d1526;--bg3:#111d35;--card:#0f1929;
  --bdr:rgba(99,179,237,0.12);--bdr2:rgba(99,179,237,0.22);
  --a:#38bdf8;--a2:#818cf8;--g:#34d399;--o:#fb923c;
  --r:#f87171;--y:#fbbf24;--p:#c084fc;--t:#2dd4bf;
  --tx:#e2e8f0;--mu:#64748b;--mu2:#475569;
  --rr:10px;--rs:6px;
  --sans:'Syne',sans-serif;--mono:'JetBrains Mono',monospace;
}
*,::before,::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;}

/* TELA DE LOGIN INTEGRADA */
#login-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:10000;}
.login-card{background:var(--card);border:1px solid var(--bdr2);border-radius:var(--rr);padding:30px;width:320px;text-align:center;}
.lf input{width:100%;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rs);padding:12px;color:#fff;margin-bottom:12px;outline:none;}
.btn-login{width:100%;background:var(--a);color:#000;border:none;padding:12px;border-radius:var(--rs);font-weight:700;cursor:pointer;width:100%;}
#app{display:none;flex-direction:column;min-height:100vh;}

/* CSS DE INTERFACE (IGUAL AO SEU) */
.topbar{height:52px;background:var(--card);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 16px;justify-content:space-between;position:sticky;top:0;z-index:100;}
.tb-clock{font-family:var(--mono);font-size:13px;color:var(--a);font-weight:600;}
.main-content{flex:1;padding:16px;padding-bottom:80px;}
.view{display:none;}
.view.on{display:flex;flex-direction:column;gap:16px;}
.bot-nav{position:fixed;bottom:0;width:100%;height:64px;background:var(--card);border-top:1px solid var(--bdr);display:flex;justify-content:space-around;align-items:center;z-index:100;}
.bn{background:none;border:none;color:var(--mu);display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;flex:1;}
.bn.on{color:var(--a);}
.bn span{font-size:9px;font-weight:600;text-transform:uppercase;}

/* TAB BOTÕES RH */
.tab-rh-btn{background:var(--bg3);color:var(--mu);border:1px solid var(--bdr);padding:8px 12px;border-radius:20px;font-size:11px;cursor:pointer;white-space:nowrap;margin-right:5px;}
.tab-rh-btn.on{background:var(--a);color:#000;border-color:var(--a);}

/* BLINDAGEM - ESCONDER ABAS ADM */
.adm-only { display: none !important; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h2 style="color:var(--a);margin-bottom:20px;font-weight:800;">LOGITREIN 4.0</h2>
    <div class="lf"><input id="lu" type="text" placeholder="USUÁRIO" autocomplete="off"></div>
    <div class="lf"><input id="lp" type="password" placeholder="SENHA"></div>
    <button class="btn-login" onclick="doLogin()">ACESSAR SISTEMA</button>
    <p id="lerr" style="color:var(--r);font-size:11px;display:none;margin-top:10px;">Credenciais inválidas.</p>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div style="font-weight:800;color:var(--a);">LT4</div>
    <div id="tb-title" style="font-size:12px;font-weight:600;color:var(--mu);">DASHBOARD</div>
    <div id="tb-clock" class="tb-clock">00:00:00</div>
  </div>

  <div class="main-content" id="main-content">
     </div>

  <nav class="bot-nav">
    <button class="bn on" onclick="showView('v-dash',this)"><span>Dash</span></button>
    <button class="bn" onclick="showView('v-os',this)"><span>OS</span></button>
    <button class="bn" onclick="showView('v-rh',this)"><span>RH</span></button>
  </nav>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// BANCO DE DADOS E LÓGICA (O "CÉREBRO" QUE VOCÊ CRIOU)
// ═══════════════════════════════════════════════════════════════
const S = {
  g: k => JSON.parse(localStorage.getItem('lt4_'+k)),
  s: (k,v) => localStorage.setItem('lt4_'+k, JSON.stringify(v))
};

// Funções de Login
function doLogin() {
  const u = document.getElementById('lu').value.toLowerCase();
  const p = document.getElementById('lp').value;

  const isMaster = (u === 'jorge.zensque' && p === 'master2026') || (u === 'gestor' && p === 'gest123');
  const isOp = (u.startsWith('op') && p === 'op123');

  if (isMaster || isOp) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';

    // Se for operador, marcamos o sistema para esconder as abas de RH
    if (isOp) {
       window.userRole = 'operador';
    } else {
       window.userRole = 'admin';
    }

    // DISPARA O "CÉREBRO" DO SISTEMA
    startSystem();
  } else {
    document.getElementById('lerr').style.display = 'block';
  }
}

function startSystem() {
    // Inicia o relógio e a lógica de OS (o operador não fica mais "burro")
    setInterval(updateClock, 1000);
    setInterval(tick, 1000); // Esta função faz as OS rodarem!
    renderDashboard();
    renderRH('ponto');
}

// ═══════════════════════════════════════════════════════════════
// ESSA FUNÇÃO É O QUE VOCÊ PEDIU: FILTRA O RH SEM MATAR O SISTEMA
// ═══════════════════════════════════════════════════════════════
function renderRH(aba) {
    let html = `<h2>Recursos Humanos</h2>
    <div style="display:flex; overflow-x:auto; padding-bottom:10px;">
        <button class="tab-rh-btn ${aba==='ponto'?'on':''}" onclick="renderRH('ponto')">PONTO</button>`;
    
    // SÓ ADICIONA OS OUTROS BOTÕES SE NÃO FOR OPERADOR
    if (window.userRole === 'admin') {
        html += `
        <button class="tab-rh-btn ${aba==='treino'?'on':''}" onclick="renderRH('treino')">TREINAMENTO</button>
        <button class="tab-rh-btn ${aba==='promo'?'on':''}" onclick="renderRH('promo')">PROMOÇÕES</button>
        <button class="tab-rh-btn ${aba==='disc'?'on':''}" onclick="renderRH('disc')">DISC</button>
        <button class="tab-rh-btn ${aba==='nr1'?'on':''}" onclick="renderRH('nr1')">NR1</button>`;
    }

    html += `</div><div id="rh-inner-content"></div>`;
    document.getElementById('v-rh').innerHTML = html;
    
    // Aqui você mantém sua lógica original de preencher a tabela de ponto ou disc...
    document.getElementById('rh-inner-content').innerHTML = `<p style="padding:20px; color:var(--mu);">Carregando dados de ${aba}...</p>`;
}

// ... COLE AQUI O RESTANTE DO SEU CÓDIGO DO "logitrein (1).html" ...
// (Aquelas funções tick(), renderDashboard(), as listas de jovens, etc.)

function updateClock() {
  const n=new Date();
  document.getElementById('tb-clock').textContent=n.toLocaleTimeString('pt-BR');
}

function tick() {
    // Sua lógica de OS funcionando em tempo real aqui!
}
</script>
</body>
</html>
