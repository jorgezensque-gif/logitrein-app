<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>LogiTrein 4.0 — Sistema Unificado</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* CSS ORIGINAL PRESERVADO */
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{
  --bg:#070b14;--bg2:#0d1526;--bg3:#111d35;--card:#0f1929;
  --bdr:rgba(99,179,237,0.12);--bdr2:rgba(99,179,237,0.22);
  --a:#38bdf8;--a2:#818cf8;--g:#34d399;--o:#fb923c;
  --r:#f87171;--y:#fbbf24;--p:#c084fc;--t:#2dd4bf;
  --tx:#e2e8f0;--mu:#64748b;--mu2:#475569;
  --rr:10px;--rs:6px;
  --sans:'Syne',sans-serif;--mono:'JetBrains Mono',monospace;
}
*,::before,::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;}

/* ESTILO DA TELA DE LOGIN (BLINDAGEM) */
#login-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:10000;}
.login-card{background:var(--card);border:1px solid var(--bdr2);border-radius:var(--rr);padding:30px;width:320px;text-align:center;}
.lf input{width:100%;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rs);padding:10px;color:#fff;margin-bottom:12px;outline:none;}
.btn-login{width:100%;background:var(--a);color:#000;border:none;padding:12px;border-radius:var(--rs);font-weight:700;cursor:pointer;}
#app{display:none;flex-direction:column;min-height:100vh;}

/* CONTROLE DE VISIBILIDADE DAS ABAS */
.admin-only { display: none !important; }

/* REAPROVEITANDO SEUS ESTILOS ORIGINAIS */
.topbar{height:52px;background:var(--card);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 16px;justify-content:space-between;position:sticky;top:0;z-index:100;}
.tb-brand{font-weight:800;color:var(--a);font-size:18px;letter-spacing:-1px;}
.tb-title{font-size:12px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:1px;}
.tb-clock{font-family:var(--mono);font-size:13px;color:var(--a);font-weight:600;}

.main-content{flex:1;padding:16px;padding-bottom:80px;display:flex;flex-direction:column;gap:16px;}
.view{display:none;}
.view.on{display:flex;flex-direction:column;gap:16px;}

.bot-nav{position:fixed;bottom:0;width:100%;height:64px;background:var(--card);border-top:1px solid var(--bdr);display:flex;justify-content:space-around;align-items:center;padding:0 10px;z-index:100;}
.bn{background:none;border:none;color:var(--mu);display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:0.2s;flex:1;}
.bn.on{color:var(--a);}
.bn i{font-size:18px;}
.bn span{font-size:9px;font-weight:600;text-transform:uppercase;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h2 style="color:var(--a);margin-bottom:20px;font-weight:800;">LOGITREIN 4.0</h2>
    <div class="lf"><input id="lu" type="text" placeholder="USUÁRIO" autocomplete="off"></div>
    <div class="lf"><input id="lp" type="password" placeholder="SENHA"></div>
    <button class="btn-login" onclick="doLogin()">ENTRAR</button>
    <p id="lerr" style="color:var(--r);font-size:11px;display:none;margin-top:10px;">Acesso negado.</p>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="tb-brand">LT4</div>
    <div id="tb-title" class="tb-title">Dashboard</div>
    <div id="tb-clock" class="tb-clock">00:00:00</div>
  </div>

  <div class="main-content" id="content">
    </div>

  <nav class="bot-nav">
    <button class="bn on" onclick="showView('v-dash',this)"><span>Dash</span></button>
    <button class="bn" onclick="showView('v-os',this)"><span>OS</span></button>
    <button class="bn" onclick="showView('v-rh',this)"><span>RH</span></button>
  </nav>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// SISTEMA DE LOGIN COM FILTRO PARA OPERADORES
// ═══════════════════════════════════════════════════════════════
function doLogin() {
  const u = document.getElementById('lu').value.toLowerCase();
  const p = document.getElementById('lp').value;

  const isMaster = (u === 'jorge.zensque' && p === 'master2026') || (u === 'gestor' && p === 'gest123');
  const isOp = (u.startsWith('op') && p === 'op123');

  if (isMaster || isOp) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';

    // Se for Operador, escondemos as abas proibidas de RH
    if (isOp) {
       // O código aqui vai ocultar os botões de Treinamento, Promoção, etc.
       document.querySelectorAll('.tab-rh-btn').forEach(btn => {
          if (!btn.innerText.includes('PONTO')) {
             btn.style.display = 'none';
          }
       });
    }

    // DISPARA O RELÓGIO E AS FUNÇÕES ORIGINAIS
    initRealTime();
  } else {
    document.getElementById('lerr').style.display = 'block';
  }
}

function initRealTime() {
    setInterval(updateClock, 1000);
    updateClock();
    // Aqui chamamos as suas funções que renderizam os gráficos e as tabelas
    if (typeof renderDashboard === 'function') renderDashboard();
}

function updateClock() {
    const n = new Date();
    const clock = document.getElementById('tb-clock');
    if(clock) clock.textContent = n.toLocaleTimeString('pt-BR');
}

function showView(id, btn) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
    const target = document.getElementById(id);
    if(target) target.classList.add('on');
    document.querySelectorAll('.bn').forEach(b => b.classList.remove('on'));
    if(btn) btn.classList.add('on');
    document.getElementById('tb-title').textContent = id.replace('v-', '').toUpperCase();
}

// ═══════════════════════════════════════════════════════════════
// COLE AQUI TODO O RESTANTE DO SEU CÓDIGO (LINHA 450 EM DIANTE)
// DO ARQUIVO "logitrein (1).html" - OS DADOS, OS GRÁFICOS, ETC.
// ═══════════════════════════════════════════════════════════════
</script>
</body>
</html>
