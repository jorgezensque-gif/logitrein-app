<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>LogiTrein 4.0 — Sistema Unificado</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* CSS ORIGINAL PRESERVADO */
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{
  --bg:#070b14;--bg2:#0d1526;--bg3:#111d35;--card:#0f1929;
  --bdr:rgba(99,179,237,0.12);--bdr2:rgba(99,179,237,0.22);
  --a:#38bdf8;--a2:#818cf8;--g:#34d399;--o:#fb923c;
  --r:#f87171;--y:#fbbf24;--p:#c084fc;--t:#2dd4bf;
  --tx:#e2e8f0;--mu:#64748b;--mu2:#475569;
  --rr:10px;--rs:6px;
  --sans:'Syne',sans-serif;--mono:'JetBrains Mono',monospace;
}
*,::before,::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;}
#login-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;}
.login-card{background:var(--card);border:1px solid var(--bdr2);border-radius:var(--rr);padding:30px;width:320px;}
.btn-login{width:100%;background:var(--a);color:#000;border:none;padding:12px;border-radius:var(--rs);font-weight:700;cursor:pointer;margin-top:15px;}
#app{display:none;flex-direction:column;min-height:100vh;}
/* ... (Resto do seu CSS original de Views, Tabelas e Dash) ... */
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h2 style="text-align:center;color:var(--a);margin-bottom:20px;">LOGITREIN 4.0</h2>
    <input id="lu" type="text" placeholder="Usuário" style="width:100%;padding:10px;margin-bottom:10px;background:var(--bg3);border:1px solid var(--bdr);color:#fff;">
    <input id="lp" type="password" placeholder="Senha" style="width:100%;padding:10px;background:var(--bg3);border:1px solid var(--bdr);color:#fff;">
    <button class="btn-login" onclick="doLogin()">ACESSAR SISTEMA</button>
    <p id="lerr" style="color:var(--r);font-size:12px;display:none;margin-top:10px;text-align:center;">Credenciais inválidas.</p>
  </div>
</div>

<div id="app">
  <div class="topbar" style="height:52px;background:var(--card);display:flex;align-items:center;padding:0 16px;justify-content:space-between;border-bottom:1px solid var(--bdr);">
    <div style="font-weight:700;color:var(--a);">LT4</div>
    <div id="tb-title">Dashboard</div>
    <div id="tb-clock">00:00</div>
  </div>

  <div id="content">
    </div>
</div>

<script>
// FUNÇÃO DOLOGIN BLINDADA (Substituída para segurança)
function doLogin() {
  const u = document.getElementById('lu').value.toLowerCase();
  const p = document.getElementById('lp').value;

  const isMaster = (u === 'jorge.zensque' && p === 'master2026');
  const isGestor = (u === 'gestor' && p === 'gest123');
  const isLider = (['lider.a', 'lider.b', 'lider.c'].includes(u) && p === 'lid123');
  const isOp = (u.startsWith('op') && p === 'op123');

  if (isMaster || isGestor || isLider || isOp) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    
    // Inicia suas funções originais de tempo real
    if (typeof tick === 'function') {
      setInterval(tick, 1000); 
      setInterval(updateClock, 1000);
      renderDashboard();
    }
  } else {
    document.getElementById('lerr').style.display = 'block';
  }
}

// SUAS FUNÇÕES ORIGINAIS DE TICK, CLOCK E RENDERIZAÇÃO
function tick() {
  /* ... Seu código original de progresso de OS e lógica de tempo ... */
}

function updateClock() {
  const n = new Date();
  document.getElementById('tb-clock').textContent = n.toLocaleTimeString('pt-BR');
}

/* ... (O restante das suas centenas de linhas originais de DiSC, SAP e PDI) ... */
</script>
</body>
</html>
