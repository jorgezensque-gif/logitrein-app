<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>LogiTrein 4.0 — Sistema Unificado</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{
  --bg:#070b14;--bg2:#0d1526;--bg3:#111d35;--card:#0f1929;
  --bdr:rgba(99,179,237,0.12);--bdr2:rgba(99,179,237,0.22);
  --a:#38bdf8;--a2:#818cf8;--g:#34d399;--o:#fb923c;
  --r:#f87171;--y:#fbbf24;--p:#c084fc;--t:#2dd4bf;
  --tx:#e2e8f0;--mu:#64748b;--mu2:#475569;
  --rr:10px;--rs:6px;
  --sans:'Syne',sans-serif;--mono:'JetBrains Mono',monospace;
}
*,::before,::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--sans);background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;}

/* SCROLLBAR */
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px;}

/* TELA LOGIN */
#login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--bg);position:relative;overflow:hidden;
}
.login-box{ width:100%;max-width:400px;padding:24px;position:relative;z-index:1; }
.login-logo{text-align:center;margin-bottom:36px;}
.login-logo .brand{font-size:32px;font-weight:700;color:var(--a);letter-spacing:-1px;}
.login-card{ background:var(--card);border:1px solid var(--bdr2);border-radius:var(--rr);padding:28px 24px; }
.lf{margin-bottom:14px;}
.lf label{display:block;font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;}
.lf input{
  width:100%;background:var(--bg3);border:1px solid var(--bdr);
  border-radius:var(--rs);padding:11px 13px;color:var(--tx);
  font-family:var(--sans);font-size:14px;outline:none;
}
.btn-login{
  width:100%;background:var(--a);color:#000;border:none;
  border-radius:var(--rs);padding:13px;font-weight:700;cursor:pointer;
}
.lerr{color:var(--r);font-size:12px;text-align:center;margin-top:10px;display:none;}

/* APP SHELL */
#app{display:none;min-height:100vh;flex-direction:column;}
#app.show{display:flex;}
.topbar{ height:52px;background:var(--card);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 16px;gap:12px; }
</style>
</head>
<body>

<div id="login-screen">
<div class="login-box">
  <div class="login-logo">
    <div class="brand">LOGITREIN 4.0</div>
  </div>
  <div class="login-card">
    <div class="lf"><label>Usuário</label><input id="lu" placeholder="ex: carlos.mendes"></div>
    <div class="lf"><label>Senha</label><input id="lp" type="password" placeholder="••••••••"></div>
    <button class="btn-login" onclick="doLogin()">ACESSAR SISTEMA</button>
    <div class="lerr" id="lerr">Usuário ou senha incorretos.</div>
  </div>
</div>
</div>

<script>
function doLogin() {
  const u = document.getElementById('lu').value;
  const p = document.getElementById('lp').value;
  // Simulação simples de login para teste
  if(u === 'gestor' && p === 'gest123') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('show');
  } else {
    document.getElementById('lerr').style.display = 'block';
  }
}
</script>

<div id="app">
  <div class="topbar">
    <div style="color:var(--a); font-weight:bold;">LT4 - Logado com Sucesso!</div>
  </div>
</div>

</body>
</html>
