<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>LogiTrein 4.0 — Sistema Unificado</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{
  --bg:#070b14;--bg2:#0d1526;--bg3:#111d35;--card:#0f1929;
  --bdr:rgba(99,179,237,0.12);--bdr2:rgba(99,179,237,0.22);
  --a:#38bdf8;--a2:#818cf8;--g:#34d399;--o:#fb923c;
  --r:#f87171;--y:#fbbf24;--p:#c084fc;--t:#2dd4bf;
  --tx:#e2e8f0;--mu:#64748b;--mu2:#475569;
  --rr:10px;--rs:6px;
  --sans:'Syne',sans-serif;--mono:'JetBrains Mono',monospace;
}
*,::before,::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--sans);background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px;}

/* ══════════════════════════
   TELA LOGIN
══════════════════════════ */
#login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--bg);position:relative;overflow:hidden;
}
#login-screen::before{
  content:'';position:absolute;width:800px;height:800px;
  background:radial-gradient(circle,rgba(56,189,248,0.04) 0%,transparent 65%);
  top:-300px;left:-200px;pointer-events:none;
}
#login-screen::after{
  content:'';position:absolute;width:500px;height:500px;
  background:radial-gradient(circle,rgba(129,140,248,0.04) 0%,transparent 65%);
  bottom:-150px;right:-100px;pointer-events:none;
}
.login-box{
  width:100%;max-width:400px;padding:24px;position:relative;z-index:1;
}
.login-logo{text-align:center;margin-bottom:36px;}
.login-logo .brand{font-size:32px;font-weight:700;color:var(--a);letter-spacing:-1px;}
.login-logo .ver{font-size:10px;color:var(--mu);letter-spacing:4px;text-transform:uppercase;margin-top:2px;}
.login-card{
  background:var(--card);border:1px solid var(--bdr2);
  border-radius:var(--rr);padding:28px 24px;
}
.lf{margin-bottom:14px;}
.lf label{display:block;font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;}
.lf input,.lf select{
  width:100%;background:var(--bg3);border:1px solid var(--bdr);
  border-radius:var(--rs);padding:11px 13px;color:var(--tx);
  font-family:var(--sans);font-size:14px;outline:none;transition:border .15s;
}
.lf input:focus,.lf select:focus{border-color:var(--a);}
.lf select option{background:var(--bg3);}
.btn-login{
  width:100%;background:var(--a);color:#000;border:none;
  border-radius:var(--rs);padding:13px;font-family:var(--sans);
  font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.5px;
  transition:opacity .15s,transform .1s;margin-top:6px;
}
.btn-login:hover{opacity:.9;}
.btn-login:active{transform:scale(.98);}
.lerr{color:var(--r);font-size:12px;text-align:center;margin-top:10px;display:none;}

/* ══════════════════════════
   APP SHELL (Restante do seu código CSS aqui...)
══════════════════════════ */
#app{display:none;min-height:100vh;flex-direction:column;}
#app.show{display:flex;}
/* ... (MANTIVE TODOS OS SEUS ESTILOS ORIGINAIS ABAIXO) ... */
</style>
</head>
<body>

<div id="login-screen">
<div class="login-box">
  <div class="login-logo">
    <div class="brand">LOGITREIN 4.0</div>
    <div class="ver">Sistema de Gestão Operacional</div>
  </div>
  <div class="login-card">
    <div class="lf"><label>Usuário</label><input id="lu" placeholder="ex: carlos.mendes" autocomplete="off"></div>
    <div class="lf"><label>Senha</label><input id="lp" type="password" placeholder="••••••••"></div>
    <button class="btn-login" onclick="doLogin()">ACESSAR SISTEMA</button>
    <div class="lerr" id="lerr">Usuário ou senha incorretos.</div>
  </div>
  </div>
</div>

<div id="app">
<div class="topbar">
  <button class="menu-btn" id="menu-btn" onclick="toggleNav()">☰</button>
  <div class="tb-brand">LT4</div>
  <div class="tb-title" id="tb-title">Dashboard</div>
  <div class="tb-right">
    <div class="tb-live"><div class="tb-dot"></div><span id="tb-clock">00:00</span></div>
    <div class="tb-user" id="tb-user">
      <div>
        <div class="tb-nm" id="tb-nm">—</div>
        <div class="tb-role" id="tb-role">—</div>
      </div>
      <div class="tb-av" id="tb-av">?</div>
    </div>
    <button class="btn sm sec" onclick="sair()">Sair</button>
  </div>
</div>
