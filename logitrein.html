<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>LogiTrein 4.0 — Sistema Unificado</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ... (Estilos originais de cores e layout preservados) ... */
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{
  --bg:#070b14;--bg2:#0d1526;--bg3:#111d35;--card:#0f1929;
  --bdr:rgba(99,179,237,0.12);--bdr2:rgba(99,179,237,0.22);
  --a:#38bdf8;--a2:#818cf8;--g:#34d399;--o:#fb923c;
  --r:#f87171;--y:#fbbf24;--p:#c084fc;--t:#2dd4bf;
  --tx:#e2e8f0;--mu:#64748b;--mu2:#475569;
  --rr:10px;--rs:6px;
  --sans:'Syne',sans-serif;--mono:'JetBrains Mono',monospace;
}
/* Estilos de visualização e tabelas de RH mantidos */
.view{display:none;}
.view.on{display:block;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:left;padding:7px 9px;font-size:9px;color:var(--mu);text-transform:uppercase;border-bottom:1px solid var(--bdr);}
td{padding:9px 9px;border-bottom:1px solid var(--bdr);}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo"><div class="brand">LOGITREIN 4.0</div></div>
    <div class="login-card">
      <div class="lf"><label>Usuário</label><input id="lu" placeholder="Usuário"></div>
      <div class="lf"><label>Senha</label><input id="lp" type="password" placeholder="••••••••"></div>
      <button class="btn-login" onclick="doLogin()">ACESSAR SISTEMA</button>
      <div class="lerr" id="lerr">Usuário ou senha incorretos.</div>
    </div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="tb-brand">LT4</div>
    <div id="tb-title" class="tb-title">Dashboard</div>
    <div class="tb-right"><span id="tb-clock">00:00</span></div>
  </div>

  <div class="main-content" id="content">
    <div class="view on" id="v-dash"> </div>
    <div class="view" id="v-os"> </div>
    <div class="view" id="v-rh"> 
        <h1>Recursos Humanos</h1>
        <div class="tabs">
            <button class="tab on" onclick="rhTab('ponto',this)">Ponto</button>
            <button class="tab" onclick="rhTab('disc',this)">DISC</button>
            <button class="tab" onclick="rhTab('train',this)">Treinamentos</button>
        </div>
        <div id="rh-ponto">
            <div class="card">
                <table>
                    <thead><tr><th>Funcionário</th><th>Data</th><th>Entrada</th><th>Saída</th><th>Status</th></tr></thead>
                    <tbody id="pt-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>
  </div>

  <nav class="bot-nav">
    <button class="bn" onclick="showView('v-dash',this)">Dashboard</button>
    <button class="bn" onclick="showView('v-os',this)">OS</button>
    <button class="bn" onclick="showView('v-rh',this)">RH</button>
  </nav>
</div>

<script>
// Lógica de Login e Navegação Corrigida
function doLogin() {
    const u = document.getElementById('lu').value;
    const p = document.getElementById('lp').value;
    if((u === 'jorge.zensque' && p === 'master2026') || (u === 'gestor' && p === 'gest123')) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
    } else {
        document.getElementById('lerr').style.display = 'block';
    }
}

function showView(id, btn) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
    document.getElementById(id).classList.add('on');
    document.querySelectorAll('.bn').forEach(b => b.classList.remove('on'));
    if(btn) btn.classList.add('on');
}
</script>
</body>
</html>
