<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>LogiTrein 4.0 — Sistema Unificado</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{
  --bg:#070b14;--bg2:#0d1526;--bg3:#111d35;--card:#0f1929;
  --bdr:rgba(99,179,237,0.12);--bdr2:rgba(99,179,237,0.22);
  --a:#38bdf8;--a2:#818cf8;--g:#34d399;--o:#fb923c;
  --r:#f87171;--y:#fbbf24;--p:#c084fc;--t:#2dd4bf;
  --tx:#e2e8f0;--mu:#64748b;--mu2:#475569;
  --rr:10px;--rs:6px;
  --sans:'Syne',sans-serif;--mono:'JetBrains Mono',monospace;
}
*,::before,::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--tx);min-height:100vh;overflow:hidden;}

/* LOGIN SCREEN */
#login-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:10000;}
.login-card{background:var(--card);border:1px solid var(--bdr2);border-radius:var(--rr);padding:32px;width:100%;max-width:350px;}
.lf{margin-bottom:16px;}
.lf label{display:block;font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.lf input{width:100%;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rs);padding:12px;color:#fff;outline:none;}
.btn-login{width:100%;background:var(--a);color:#000;border:none;border-radius:var(--rs);padding:14px;font-weight:700;cursor:pointer;margin-top:10px;}

/* APP LAYOUT */
#app{display:none;height:100vh;flex-direction:column;position:relative;}
.topbar{height:56px;background:var(--card);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 16px;justify-content:space-between;}
.main-content{flex:1;overflow-y:auto;padding-bottom:80px;}
.view{display:none;padding:16px;}
.view.on{display:block;}

/* RH TABS */
.tabs-rh{display:flex;gap:8px;overflow-x:auto;margin-bottom:20px;padding-bottom:8px;}
.tab-rh-btn{background:var(--bg3);color:var(--mu);border:1px solid var(--bdr);padding:8px 16px;border-radius:20px;font-size:12px;cursor:pointer;white-space:nowrap;}
.tab-rh-btn.on{background:var(--a);color:#000;border-color:var(--a);font-weight:600;}
.admin-tab{display:none;} /* Escondido por padrão */

/* BOT NAV */
.bot-nav{position:fixed;bottom:0;width:100%;height:64px;background:var(--card);border-top:1px solid var(--bdr);display:flex;justify-content:space-around;align-items:center;z-index:100;}
.bn-btn{background:none;border:none;color:var(--mu);font-size:10px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;}
.bn-btn.on{color:var(--a);}

/* TABELAS */
table{width:100%;border-collapse:collapse;margin-top:10px;}
th{text-align:left;font-size:10px;color:var(--mu);padding:12px 8px;border-bottom:1px solid var(--bdr);}
td{font-size:12px;padding:12px 8px;border-bottom:1px solid rgba(255,255,255,0.03);}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h2 style="color:var(--a);margin-bottom:24px;text-align:center;">LogiTrein 4.0</h2>
    <div class="lf"><label>Usuário</label><input id="lu" type="text" placeholder="ex: jorge.zensque"></div>
    <div class="lf"><label>Senha</label><input id="lp" type="password" placeholder="••••••••"></div>
    <button class="btn-login" onclick="doLogin()">ACESSAR</button>
    <p id="lerr" style="color:var(--r);font-size:11px;text-align:center;margin-top:12px;display:none;">Credenciais inválidas.</p>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div style="font-weight:800;color:var(--a);font-size:18px;">LT<span style="color:#fff;">4</span></div>
    <div id="tb-title" style="font-size:14px;font-weight:600;">Dashboard</div>
    <div id="tb-clock" style="font-family:var(--mono);font-size:12px;color:var(--mu);">00:00:00</div>
  </div>

  <div class="main-content">
    <div class="view on" id="v-dash">
      <h3>Visão Geral</h3>
      </div>

    <div class="view" id="v-rh">
      <h3 style="margin-bottom:16px;">Recursos Humanos</h3>
      <div class="tabs-rh" id="rh-tabs">
        <button class="tab-rh-btn on" onclick="rhTab('ponto',this)">Ponto</button>
        <button class="tab-rh-btn admin-tab" onclick="rhTab('disc',this)">DiSC</button>
        <button class="tab-rh-btn admin-tab" onclick="rhTab('treino',this)">Treinamentos</button>
        <button class="tab-rh-btn admin-tab" onclick="rhTab('promo',this)">Promoções</button>
        <button class="tab-rh-btn admin-tab" onclick="rhTab('recrut',this)">Recrutamento</button>
        <button class="tab-rh-btn admin-tab" onclick="rhTab('aval',this)">Avaliações</button>
        <button class="tab-rh-btn admin-tab" onclick="rhTab('nr1',this)">NR1</button>
      </div>
      <div id="rh-container">
        <table id="table-ponto">
          <thead><tr><th>JOVEM</th><th>DATA</th><th>ENTRADA</th><th>SAÍDA</th><th>STATUS</th></tr></thead>
          <tbody>
            <tr><td>Lucas Alves</td><td>05/04/2026</td><td>08:02</td><td>17:05</td><td><span style="color:var(--g)">OK</span></td></tr>
            <tr><td>Mariana Costa</td><td>05/04/2026</td><td>07:55</td><td>17:10</td><td><span style="color:var(--g)">OK</span></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <nav class="bot-nav">
    <button class="bn-btn on" onclick="showView('v-dash',this)"><span>DASH</span></button>
    <button class="bn-btn" onclick="showView('v-rh',this)"><span>RH</span></button>
  </nav>
</div>

<script>
function doLogin() {
  const u = document.getElementById('lu').value.toLowerCase();
  const p = document.getElementById('lp').value;

  // Credenciais
  const isMaster = (u === 'jorge.zensque' && p === 'master2026');
  const isGestor = (u === 'gestor' && p === 'gest123');
  const isOp = (u.startsWith('op') && p === 'op123');

  if (isMaster || isGestor || isOp) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';

    // BLINDAGEM: Se for o Educador Jorge ou Gestor, mostra as abas restritas
    if(isMaster || isGestor) {
      document.querySelectorAll('.admin-tab').forEach(el => el.style.display = 'block');
    }

    startClock();
  } else {
    document.getElementById('lerr').style.display = 'block';
  }
}

function showView(id, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  document.querySelectorAll('.bn-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('tb-title').innerText = id === 'v-dash' ? 'Dashboard' : 'RH';
}

function rhTab(type, btn) {
  document.querySelectorAll('.tab-rh-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  // Aqui você chama a função de renderização específica para cada aba
  console.log("Abrindo aba: " + type);
}

function startClock() {
  setInterval(() => {
    const n = new Date();
    document.getElementById('tb-clock').innerText = n.toLocaleTimeString('pt-BR');
  }, 1000);
}
</script>
</body>
</html>
