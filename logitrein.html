<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>LogiTrein 4.0 — Sistema Unificado</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* 1. SEU CSS ORIGINAL (TUDO MANTIDO) */
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{
  --bg:#070b14;--bg2:#0d1526;--bg3:#111d35;--card:#0f1929;
  --bdr:rgba(99,179,237,0.12);--bdr2:rgba(99,179,237,0.22);
  --a:#38bdf8;--a2:#818cf8;--g:#34d399;--o:#fb923c;
  --r:#f87171;--y:#fbbf24;--p:#c084fc;--t:#2dd4bf;
  --tx:#e2e8f0;--mu:#64748b;--mu2:#475569;
  --rr:10px;--rs:6px;
  --sans:'Syne',sans-serif;--mono:'JetBrains Mono',monospace;
}
*,::before,::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;}

/* ESTILO DA BLINDAGEM */
#login-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:10000;}
.login-card{background:var(--card);border:1px solid var(--bdr2);border-radius:var(--rr);padding:30px;width:320px;}
.lf input{width:100%;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rs);padding:10px;color:#fff;margin-bottom:10px;}
.btn-login{width:100%;background:var(--a);color:#000;border:none;padding:12px;border-radius:var(--rs);font-weight:700;cursor:pointer;}
#app{display:none;}
.admin-only{display:none !important;} /* Escondido para operadores */
.admin-visible{display:flex !important;} /* Mostrar apenas para Jorge/Gestor */

/* TODO O RESTANTE DO SEU CSS... (Dashboard, OS, RH, etc.) */
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h2 style="text-align:center;color:var(--a);margin-bottom:20px;">LogiTrein 4.0</h2>
    <div class="lf"><input id="lu" type="text" placeholder="Usuário"></div>
    <div class="lf"><input id="lp" type="password" placeholder="Senha"></div>
    <button class="btn-login" onclick="doLogin()">ACESSAR</button>
    <p id="lerr" style="color:var(--r);font-size:11px;display:none;margin-top:10px;text-align:center;">Erro de acesso.</p>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div style="font-weight:700;color:var(--a);">LT4</div>
    <div id="tb-title">Dashboard</div>
    <div id="tb-clock">00:00:00</div>
  </div>

  <div id="content">
    <div class="view on" id="v-dash"> </div>
    
    <div class="view" id="v-rh">
      <h2>RH - Gestão</h2>
      <div id="rh-tabs" style="display:flex; gap:8px; margin-bottom:15px; overflow-x:auto;">
        <button onclick="rhTab('ponto')">Ponto</button>
        <button class="admin-only" onclick="rhTab('treino')">Treinamento</button>
        <button class="admin-only" onclick="rhTab('promo')">Promoções</button>
        <button class="admin-only" onclick="rhTab('recrut')">Recrutamento</button>
        <button class="admin-only" onclick="rhTab('aval')">Avaliações</button>
        <button class="admin-only" onclick="rhTab('nr1')">NR1</button>
        <button class="admin-only" onclick="rhTab('disc')">DiSC</button>
      </div>
      <div id="rh-view-content"> </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// LOGIN BLINDADO (RECUPERANDO TODAS AS FUNÇÕES)
// ═══════════════════════════════════════════════════════════════
function doLogin() {
  const u = document.getElementById('lu').value.toLowerCase();
  const p = document.getElementById('lp').value;

  const isAdmin = (u === 'jorge.zensque' && p === 'master2026') || (u === 'gestor' && p === 'gest123');
  const isOp = (u.startsWith('op') && p === 'op123');

  if (isAdmin || isOp) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';

    // Se for Jorge/Gestor, libera as abas de treinamento e promoções
    if(isAdmin) {
      document.querySelectorAll('.admin-only').forEach(el => {
        el.style.setProperty('display', 'block', 'important');
      });
    }

    // DISPARA TODAS AS SUAS FUNÇÕES ORIGINAIS
    initSystem(); 
  } else {
    document.getElementById('lerr').style.display = 'block';
  }
}

function initSystem() {
    // Aqui rodam as funções que estavam no seu arquivo original
    setInterval(updateClock, 1000);
    if(typeof tick === 'function') setInterval(tick, 1000);
    renderDashboard();
}

// ═══════════════════════════════════════════════════════════════
// ABAIXO DISSO, COLE TODO O RESTANTE DO SEU SCRIPT ORIGINAL 
// (renderDashboard, renderOS, renderRH, os dados dos jovens, etc.)
// ═══════════════════════════════════════════════════════════════

function updateClock() {
  const n=new Date();
  document.getElementById('tb-clock').textContent=n.toLocaleTimeString('pt-BR');
}

// ... COPIE O RESTO DO SEU ARQUIVO logitrein (1).html DAQUI PARA BAIXO ...
</script>
</body>
</html>
